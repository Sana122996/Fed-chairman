<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>美联储主席成绩单</title>
  <style>
    :root {
      --page: #f4f7fb;
      --card: #ffffff;
      --text: #182233;
      --muted: #68758a;
      --line: #e7edf6;
      --blue: #1f65d6;
      --blue-soft: #eef6ff;
      --red: #d94738;
      --green: #138a54;
      --amber: #c88920;
      --purple: #7655d6;
      --font-display: "Songti SC", "STSong", "SimSun", "Source Han Serif SC", "Noto Serif SC", serif;
      --font-number: "D-DIN-PRO", "D-DIN", "DIN Pro", "DIN Alternate", "Arial Narrow", sans-serif;
      --font-ui: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #dfe6f0;
      color: var(--text);
      font-family: var(--font-ui);
    }

    button,
    select {
      font: inherit;
    }

    .phone {
      width: min(100vw, 414px);
      min-height: 100vh;
      margin: 0 auto;
      padding-bottom: calc(72px + env(safe-area-inset-bottom));
      background: var(--page);
      overflow: hidden;
    }

    .hero {
      position: relative;
      height: 140px;
      padding: 0;
      background: #fff;
      overflow: hidden;
    }

    .hero-copy {
      position: relative;
      left: 0;
      top: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-self: stretch;
      gap: 12px;
      width: 414px;
      max-width: 100%;
      height: 124px;
      min-width: 0;
      padding: 16px 16px 8px;
      opacity: 1;
    }

    .hero h1 {
      margin: 0;
      max-width: none;
      color: #111827;
      font-family: var(--font-display) !important;
      font-size: 24px;
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .crumb {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 0;
      color: #707888;
      font-size: 14px;
      line-height: 20px;
      white-space: nowrap;
    }

    .crumb-arrow {
      flex: 0 0 auto;
      width: 14px;
      height: 14px;
      border-right: 0;
      border-bottom: 0;
      position: relative;
    }

    .crumb-arrow::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: 7px;
      height: 7px;
      border-right: 1.6px solid #8b929d;
      border-bottom: 1.6px solid #8b929d;
      transform: rotate(-45deg);
    }

    .search-icon {
      position: relative;
      flex: 0 0 auto;
      width: 14px;
      height: 14px;
      margin-left: 1px;
      border: 1.6px solid #8b929d;
      border-radius: 50%;
    }

    .search-icon::after {
      content: "";
      position: absolute;
      right: -4px;
      bottom: -2px;
      width: 6px;
      height: 1.6px;
      border-radius: 2px;
      background: #8b929d;
      transform: rotate(45deg);
    }

    .hero-art {
      position: absolute;
      right: -18px;
      bottom: -12px;
      z-index: 1;
      width: 212px;
      height: 142px;
      margin-left: 0;
      overflow: visible;
      background: transparent;
    }

    .hero-art img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: .9;
    }

    .selectors {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      width: auto;
      margin-top: 0;
    }

    .hero-mode-trigger {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      width: auto;
      min-width: 112px;
      max-width: 210px;
      height: 40px;
      padding: 0 34px 0 14px;
      border: 0;
      border-radius: 2px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 14px;
      font-weight: 700;
      line-height: 20px;
      white-space: nowrap;
    }

    .hero-mode-trigger::after {
      content: "";
      position: absolute;
      right: 13px;
      top: 13px;
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--blue);
      border-bottom: 2px solid var(--blue);
      transform: rotate(45deg);
      pointer-events: none;
    }

    .mode-picker-mask {
      display: none;
      position: fixed;
      inset: 0 auto auto 50%;
      z-index: 52;
      width: min(100vw, 414px);
      height: 100vh;
      background: rgba(0, 0, 0, .72);
      transform: translateX(-50%);
    }

    .mode-picker-sheet {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 53;
      width: min(100vw, 414px);
      padding: 16px 16px 18px;
      background: #fff;
      transform: translate(-50%, 110%);
      transition: transform .22s ease;
    }

    .is-mode-picker-open .mode-picker-mask {
      display: block;
    }

    .is-mode-picker-open .mode-picker-sheet {
      transform: translate(-50%, 0);
    }

    .mode-picker-head {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      height: 28px;
    }

    .mode-picker-title {
      color: #111827;
      font-size: 15px;
      font-weight: 800;
      line-height: 22px;
      text-align: center;
    }

    .mode-picker-action {
      padding: 0;
      border: 0;
      background: transparent;
      color: #6b778b;
      font-size: 12px;
      line-height: 18px;
      text-align: left;
    }

    .mode-picker-action.confirm {
      color: #5A82E6;
      text-align: right;
    }

    .mode-picker-columns {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 20px;
      max-height: 244px;
      overflow: visible;
    }

    .mode-picker-columns.is-compare-mode {
      width: 50%;
      grid-template-columns: 1fr;
    }

    .mode-picker-columns::before {
      display: none;
    }

    .mode-picker-columns.is-compare-mode #modePickerChairs {
      display: none;
    }

    .mode-picker-col {
      position: relative;
      z-index: 1;
      max-height: 244px;
      padding: 0;
      overflow-y: auto;
      scroll-snap-type: none;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .mode-picker-col::-webkit-scrollbar {
      display: none;
    }

    .mode-option,
    .chair-option {
      display: block;
      width: 100%;
      height: 40px;
      padding: 0 8px;
      border: 0;
      background: transparent;
      color: #8a8f98;
      font-size: 14px;
      font-weight: 400;
      line-height: 40px;
      text-align: center;
      border-radius: 2px;
    }

    .mode-option.is-active,
    .chair-option.is-active {
      background: #f4f4f4;
      color: #111827;
      font-weight: 800;
    }

    .mode-option.is-disabled,
    .chair-option.is-disabled {
      color: #c6ccd5;
    }

    .section {
      padding: 22px 16px;
      background: #fff;
      border-top: 10px solid var(--page);
    }

    .section.first {
      border-top: 0;
      padding-top: 20px;
    }

    .compare-only,
    .score-section {
      border-top: 0;
    }

    .score-section {
      padding-top: 18px;
    }

    .section-head,
    .metric-row,
    .chart-head,
    .table-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .section-title {
      margin: 0;
      color: #162033;
      font-size: 22px;
      font-weight: 800;
      line-height: 30px;
      letter-spacing: 0;
    }

    .section-subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 19px;
    }

    .score-profile {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chair-avatar {
      display: grid;
      place-items: center;
      flex: 0 0 48px;
      width: 48px;
      height: 48px;
      aspect-ratio: 1 / 1;
      border: 1px solid #e7edf6;
      border-radius: 999px;
      background: #eef6ff;
      color: var(--blue);
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      overflow: hidden;
    }

    .chair-avatar img {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: var(--avatar-fit, cover);
      object-position: var(--avatar-position, 50% 50%);
      transform: translate(var(--avatar-x, 0), var(--avatar-y, 0)) scale(var(--avatar-scale, 1));
      transform-origin: 50% var(--avatar-origin, 50%);
    }

    .chair-avatar.has-image img {
      display: block;
    }

    .chair-avatar.has-image span {
      display: none;
    }

    .chair-name {
      color: #162033;
      font-size: 18px;
      font-weight: 800;
      line-height: 24px;
    }

    .chair-term {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 9px;
      border-radius: 2px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .big-metric {
      margin-top: 22px;
      padding: 14px 15px;
      border: 1px solid #dfeeff;
      border-radius: 2px;
      background: #f8fbff;
    }

    .metric-label {
      color: #647189;
      font-size: 13px;
      line-height: 19px;
    }

    .metric-row {
      align-items: flex-end;
      margin-top: 5px;
    }

    .metric-value {
      color: var(--red);
      font-family: var(--font-number);
      font-size: 44px;
      font-weight: 800;
      line-height: .98;
      font-variant-numeric: tabular-nums;
    }

    .metric-value.down {
      color: var(--green);
    }

    .metric-note {
      margin-top: 8px;
      color: #536177;
      font-size: 14px;
      line-height: 22px;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .mini-card {
      min-height: 78px;
      padding: 10px;
      border: 1px solid #edf2f8;
      border-radius: 2px;
      background: #fbfcff;
    }

    .mini-label {
      color: var(--muted);
      font-size: 12px;
      line-height: 17px;
    }

    .mini-value {
      margin-top: 6px;
      color: #192235;
      font-family: var(--font-number);
      font-size: 24px;
      font-weight: 800;
      line-height: 28px;
      font-variant-numeric: tabular-nums;
    }

    .red {
      color: var(--red) !important;
    }

    .green {
      color: var(--green) !important;
    }

    .blue {
      color: var(--blue) !important;
    }

    .gray {
      color: #8a96a8 !important;
    }

    .chart-card {
      margin-top: 12px;
      padding: 14px 12px 10px;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: var(--card);
    }

    .chart-title {
      color: #162033;
      font-size: 18px;
      font-weight: 800;
      line-height: 24px;
    }

    .chart-title-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .chart-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 17px;
    }

    .chart-stat {
      flex-shrink: 0;
      max-width: 164px;
      padding-top: 4px;
      text-align: right;
      font-family: var(--font-number);
      font-size: 18px;
      font-weight: 800;
      line-height: 24px;
      font-variant-numeric: tabular-nums;
    }

    .chart {
      display: block;
      width: 100%;
      height: 180px;
      margin-top: 8px;
    }

    .range-chart {
      display: block;
      width: 100%;
      height: 32px;
      margin-top: 8px;
      border-radius: 0;
      background: #f8fbff;
      cursor: ew-resize;
      touch-action: none;
    }

    .chart-guide-legend {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 0;
      color: #68758a;
      font-size: 11px;
      line-height: 16px;
      white-space: nowrap;
    }

    .chart-guide-legend i {
      width: 18px;
      height: 8px;
      border: 0;
      background: rgba(217, 71, 56, .1);
    }

    .chart-guide-legend.is-line i {
      height: 0;
      border-top: 1px dashed var(--red);
      background: transparent;
    }

    .chart-guide-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 18px;
      margin-top: 2px;
      margin-bottom: 2px;
    }

    .compare-rate-card {
      margin-top: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .section.compare-only {
      padding-top: 18px;
      padding-bottom: 12px;
    }

    .compare-chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .compare-chart-title {
      color: #162033;
      font-size: 18px;
      font-weight: 800;
      line-height: 24px;
    }

    .compare-chart-meta {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 17px;
    }

    .compare-divider {
      height: 6px;
      width: calc(100% + 32px);
      margin: 12px -16px 0;
      background: #f4f7fb;
    }

    .history-rate-chart {
      display: block;
      width: 100%;
      height: 178px;
      margin-top: 6px;
    }

    .compare-only {
      display: none;
    }

    .is-compare .single-only {
      display: none;
    }

    .is-compare .compare-only {
      display: block;
    }

    .is-compare .score-profile {
      display: none;
    }

    .is-compare .score-section {
      padding-top: 12px;
    }

    .is-compare #charts .chart-card:first-child {
      margin-top: 0;
    }

    .is-compare .chart-head {
      align-items: center;
    }

    .is-compare .chart-meta {
      margin-top: 0;
      text-align: right;
    }

    .compare-picker-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 32px;
      margin-top: 10px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: #fff;
      color: #1b2536;
      text-align: left;
    }

    .compare-picker-title {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 18px;
      font-weight: 800;
      line-height: 24px;
    }

    .compare-picker-trigger .compare-picker-title {
      font-size: 18px;
      line-height: 24px;
    }

    .compare-picker-count {
      color: #68758a;
      font-size: 12px;
      line-height: 18px;
    }

    .trigger-chevron {
      width: 7px;
      height: 7px;
      margin-top: -2px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg);
    }

    .compare-picker-mask {
      display: none;
      position: fixed;
      inset: 0 auto auto 50%;
      z-index: 48;
      width: min(100vw, 414px);
      height: 100vh;
      background: rgba(0, 0, 0, .58);
      transform: translateX(-50%);
    }

    .compare-picker-sheet {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 49;
      width: min(100vw, 414px);
      padding: 18px 20px 28px;
      background: #fff;
      box-shadow: 0 -12px 26px rgba(18, 32, 55, .14);
      transform: translate(-50%, 110%);
      transition: transform .22s ease;
    }

    .is-picker-open .compare-picker-mask {
      display: block;
    }

    .is-picker-open .compare-picker-sheet {
      transform: translate(-50%, 0);
    }

    .picker-sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .picker-sheet-title {
      color: #111827;
      font-size: 18px;
      font-weight: 800;
      line-height: 24px;
    }

    .picker-close {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #8a96a8;
    }

    .picker-close svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
    }

    .compare-picker {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .compare-picker-sheet .compare-picker {
      margin-top: 16px;
    }

    .picker-confirm {
      display: block;
      width: 100%;
      height: 40px;
      margin-top: 14px;
      border: 0;
      border-radius: 2px;
      background: #5A82E6;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      line-height: 40px;
      text-align: center;
    }

    .picker-home-indicator {
      width: 118px;
      height: 4px;
      margin: 16px auto 0;
      border-radius: 999px;
      background: #111;
    }

    .check-pill {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-width: 0;
      min-height: 40px;
      padding: 0 9px 0 32px;
      border: .5px solid #dcdcdc;
      border-radius: 0;
      background: #fff;
      color: rgba(0, 0, 0, .9);
      font-size: 14px;
      font-weight: 400;
      white-space: nowrap;
    }

    .check-pill:has(input:checked) {
      background: #eef4ff;
      border-color: #dcdcdc;
      color: #5A82E6;
      font-weight: 600;
    }

    .check-pill input {
      position: absolute;
      left: 8px;
      top: 50%;
      width: 20px;
      height: 20px;
      margin: -10px 0 0;
      opacity: 0;
      pointer-events: none;
    }

    .check-pill::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 50%;
      width: 18px;
      height: 18px;
      margin-top: -9px;
      border: .5px solid #dcdcdc;
      border-radius: 50%;
      background: #fff;
    }

    .check-pill:has(input:checked)::before {
      border-color: #5A82E6;
      background: #5A82E6;
    }

    .check-pill:has(input:checked)::after {
      content: "";
      position: absolute;
      left: 14px;
      top: 50%;
      width: 6px;
      height: 10px;
      margin-top: -7px;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(45deg);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      margin-top: 8px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      color: #536177;
      font-size: 12px;
      line-height: 18px;
    }

    .legend-line {
      width: 22px;
      height: 5px;
      margin-right: 6px;
      border-radius: 2px;
    }

    .table-scroll {
      width: 100%;
      margin-top: 10px;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: #fff;
    }

    table {
      width: 800px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    th,
    td {
      padding: 12px 10px;
      border: 0;
      border-bottom: 1px solid #edf2f8;
      background: #fff;
      text-align: right;
      font-size: 13px;
      line-height: 18px;
      color: #30394a;
      font-variant-numeric: tabular-nums;
    }

    th {
      background: #f7faff;
      color: #66748a;
      font-weight: 800;
    }

    th:first-child,
    td:first-child {
      position: sticky;
      left: 0;
      z-index: 2;
      width: 86px;
      min-width: 86px;
      max-width: 86px;
      box-shadow: 1px 0 0 #edf2f8;
      text-align: left;
      font-weight: 800;
    }

    th:first-child {
      z-index: 4;
      background: #f7faff;
    }

    td:first-child {
      z-index: 3;
      background: #fff;
    }

    .th-content {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      min-width: 0;
      white-space: nowrap;
    }

    th:first-child .th-content {
      justify-content: flex-start;
    }

    .sort-btn {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: #a7b1c0;
    }

    .sort-btn.is-active {
      color: #5A82E6;
    }

    .sort-icon {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    .sort-btn .sort-up,
    .sort-btn .sort-down {
      opacity: .48;
    }

    .sort-btn.is-asc .sort-up,
    .sort-btn.is-desc .sort-down {
      opacity: 1;
    }

    .sort-btn.is-asc .sort-down,
    .sort-btn.is-desc .sort-up {
      opacity: .22;
    }

    td .term {

    let draftCompareIds = [...compareIds];
    let compareSort = { key: null, direction: "desc" };
    let comparePickerOpen = false;
    let modePickerOpen = false;
    let draftMode = mode;
    let draftChairId = currentId;

    const $ = (selector) => document.querySelector(selector);
    const byId = (id) => chairmen.find((item) => item.id === id) || chairmen[0];
    const getTermRange = (id) => termDateMap[id] || { start: byId(id).term.split("-")[0], end: byId(id).term.split("-")[1] || "" };

    function formatDateDot(date) {
      return date.replace(/-/g, ".");
    }

    function formatDateMonth(date) {
      return date.replace(/\./g, "-").slice(0, 7);
    }

    function parseDateTime(date) {
      return new Date(date.replace(/\./g, "-")).getTime();
    }

    function interpolateDate(startDate, endDate, index, total) {
      const start = parseDateTime(startDate);
      const end = parseDateTime(endDate);
      const ratio = total <= 1 ? 0 : index / (total - 1);
      return start + (end - start) * ratio;
    }

    function yearFromTime(time) {
      return new Date(time).getFullYear();
    }

    function formatHeadline(chairman, key) {
      const raw = chairman.headlines[key];
      if (key === "rate") {
        return raw.replace("加息 +", "任内加息 ").replace("降息 -", "任内降息 ");
      }
      if (key === "unemployment") {
        return raw.replace("高点 ", "峰值").replace("高点", "峰值");
      }
      if (key === "cpi") return raw.includes("峰值") ? raw : raw.replace("均值", "峰值").replace("终点", "峰值").replace("低点", "峰值");
      return raw.startsWith("任内") ? raw.replace(/^任内(?=[+\-\d])/, "任内 ") : `任内 ${raw}`;
    }

    function niceStep(rawStep) {
      if (!Number.isFinite(rawStep) || rawStep <= 0) return 1;
      const power = Math.pow(10, Math.floor(Math.log10(rawStep)));
      const normalized = rawStep / power;
      const nice = normalized <= 1 ? 1 : normalized <= 2 ? 2 : normalized <= 5 ? 5 : 10;
      return nice * power;
    }

    function buildNiceScale(values, chart) {
      const showGuides = mode !== "compare";
      const guideValues = showGuides ? (chart.guideLines || []).map((line) => line.value).filter(Number.isFinite) : [];
      const guideBandValues = showGuides && chart.guideBand ? [chart.guideBand.from, chart.guideBand.to].filter(Number.isFinite) : [];
      const scaleValues = values.concat(guideValues, guideBandValues);
      const rawMin = Math.min(...scaleValues);
      const rawMax = Math.max(...scaleValues);
      const span = rawMax - rawMin || Math.abs(rawMax) || 1;
      let step = niceStep(span / 4);
      if (chart.unit === "%" && step < 1) step = 1;
      const includeZero = chart.unit === "%" && rawMin >= 0;
      const min = includeZero ? 0 : Math.floor(rawMin / step) * step;
      const max = Math.ceil(rawMax / step) * step;
      const ticks = [];
      for (let value = min; value <= max + step * 0.5; value += step) {
        ticks.push(Number(value.toFixed(8)));
      }
      return { min, max: ticks[ticks.length - 1], ticks };
    }

    function drawGuideLines(ctx, chart, width, pad, plotH, min, max) {
      if (mode === "compare") return;
      if (!chart.guideLines?.length && !chart.guideBand) return;
      ctx.save();
      if (chart.guideBand && Number.isFinite(chart.guideBand.from) && Number.isFinite(chart.guideBand.to)) {
        const from = Math.max(min, Math.min(max, chart.guideBand.from));
        const to = Math.max(min, Math.min(max, chart.guideBand.to));
        const y1 = pad.top + plotH - ((Math.max(from, to) - min) / (max - min || 1)) * plotH;
        const y2 = pad.top + plotH - ((Math.min(from, to) - min) / (max - min || 1)) * plotH;
        ctx.fillStyle = "rgba(217, 71, 56, .1)";
        ctx.fillRect(pad.left, y1, width - pad.left - pad.right, Math.max(1, y2 - y1));
      }
      ctx.font = "10px -apple-system, BlinkMacSystemFont, PingFang SC";
      ctx.textBaseline = "middle";
      ctx.textAlign = "right";
      (chart.guideLines || []).forEach((line, index) => {
        if (!Number.isFinite(line.value) || line.value < min || line.value > max) return;
        const y = pad.top + plotH - ((line.value - min) / (max - min || 1)) * plotH;
        ctx.strokeStyle = "rgba(217, 71, 56, .72)";
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
        ctx.setLineDash([]);
      });
      ctx.restore();
    }

    function formatAxisLabel(value, unit) {
      const rounded = Math.abs(value) < 1e-8 ? 0 : value;
      const hasDecimal = Math.abs(rounded % 1) > 1e-8;
      const label = hasDecimal ? rounded.toFixed(1) : String(Math.round(rounded));
      return unit === "%" ? `${label}%` : Number(label).toLocaleString("en-US");
    }

    function formatYear(date) {
      return date.replace(/\./g, "-").slice(0, 4);
    }

    function buildYearTicks(startDate, endDate) {
      const startYear = Number(formatYear(startDate));
      const endYear = Number(formatYear(endDate));
      if (!Number.isFinite(startYear) || !Number.isFinite(endYear) || endYear < startYear) {
        return [];
      }
      if (endYear === startYear) return [String(startYear)];
      const ticks = [];
      for (let year = startYear; year <= endYear; year += 2) {
        ticks.push(String(year));
      }
      if (ticks[ticks.length - 1] !== String(endYear)) ticks.push(String(endYear));
      return ticks;
    }

    function buildYearTicksForWidth(startDate, endDate, plotWidth, minGap = 44) {
      const startYear = Number(formatYear(startDate));
      const endYear = Number(formatYear(endDate));
      if (!Number.isFinite(startYear) || !Number.isFinite(endYear) || endYear < startYear) {
        return [];
      }
      if (endYear === startYear) return [String(startYear)];
      const span = endYear - startYear;
      const maxLabels = Math.max(2, Math.floor(plotWidth / minGap));
      const step = Math.max(1, Math.ceil(span / Math.max(maxLabels - 1, 1)));
      const ticks = [String(startYear)];
      let year = startYear + step;
      while (year < endYear) {
        ticks.push(String(year));
        year += step;
      }
      if (ticks[ticks.length - 1] !== String(endYear)) ticks.push(String(endYear));
      return ticks;
    }

    function getRangeState(key) {
      if (!rangeStates[key]) rangeStates[key] = { start: 0, end: 1 };
      return rangeStates[key];
    }

    function setRangeState(key, next) {
      const minWidth = .08;
      let start = clamp(next.start, 0, 1 - minWidth);
      let end = clamp(next.end, minWidth, 1);
      if (end - start < minWidth) {
        if (next.anchor === "start") {
          end = clamp(start + minWidth, minWidth, 1);
        } else {
          start = clamp(end - minWidth, 0, 1 - minWidth);
        }
      }
      rangeStates[key] = { start, end };
    }

    function filterPointsByRange(points, key) {
      if (points.length <= 2) return points;
      const range = getRangeState(key);
      const lastIndex = points.length - 1;
      let startIndex = Math.floor(range.start * lastIndex);
      let endIndex = Math.ceil(range.end * lastIndex);
      startIndex = clamp(startIndex, 0, lastIndex - 1);
      endIndex = clamp(endIndex, startIndex + 1, lastIndex);
      return points.slice(startIndex, endIndex + 1);
    }

    function getVisibleWindowMeta(points, key) {
      const range = getRangeState(key);
      const lastIndex = Math.max(points.length - 1, 0);
      const startIndex = clamp(Math.floor(range.start * lastIndex), 0, lastIndex);
      const endIndex = clamp(Math.ceil(range.end * lastIndex), startIndex, lastIndex);
      return {
        range,
        startIndex,
        endIndex,
        first: points[startIndex] || points[0],
        last: points[endIndex] || points.at(-1)
      };
    }

    function isDirectionalText(text) {
      return /[+\-]|加息|降息|涨|跌/.test(text);
    }

    function isZeroMoveText(text) {
      const compact = String(text).replace(/\s+/g, "");
      if (compact.includes("未变动") || compact.includes("未有利率变动")) return true;
      const match = compact.match(/[+\-]?\d+(?:\.\d+)?(?=%|bp|pct)/);
      return Boolean(match) && Math.abs(Number(match[0])) < 0.005;
    }

    function statColor(headline) {
      if (isZeroMoveText(headline)) return "#8a96a8";
      if (String(headline).includes("峰值")) return "var(--red)";
      if (headline.includes("-") || headline.includes("降息")) return "var(--green)";
      return isDirectionalText(headline) ? "var(--red)" : "var(--blue)";
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function chairColor(id) {
      const index = chairmen.findIndex((item) => item.id === id);
      return chairColors[(index >= 0 ? index : 0) % chairColors.length];
    }

    function drawLabel(ctx, text, x, y, options = {}) {
      const paddingX = 3;
      ctx.save();
      ctx.font = options.font || "bold 12px D-DIN-PRO, DIN Alternate, Arial Narrow";
      ctx.textBaseline = "middle";
      ctx.textAlign = options.align || "left";
      const metrics = ctx.measureText(text);
      const canvasWidth = options.canvasWidth || 360;
      let drawX = x;
      if (ctx.textAlign === "left") {
        drawX = clamp(x, paddingX, canvasWidth - metrics.width - paddingX);
      } else if (ctx.textAlign === "right") {
        drawX = clamp(x, metrics.width + paddingX, canvasWidth - paddingX);
      }
      const drawY = clamp(y, 8, (options.canvasHeight || 180) - 8);
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 4;
      ctx.strokeText(text, drawX, drawY);
      ctx.fillStyle = options.color || "#1f65d6";
      ctx.fillText(text, drawX, drawY);
      ctx.restore();
    }

    function drawMarkedPoint(ctx, point, color, radius) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "#fff";
      ctx.stroke();
      ctx.restore();
    }

    function drawRoundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + width - r, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + r);
      ctx.lineTo(x + width, y + height - r);
      ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      ctx.lineTo(x + r, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawWatermark(ctx, width, height, pad) {
      ctx.save();
      ctx.globalAlpha = .1;
      const logoW = 70;
      const logoRatio = watermarkLogo.naturalWidth && watermarkLogo.naturalHeight
        ? watermarkLogo.naturalHeight / watermarkLogo.naturalWidth
        : 393 / 1275;
      const logoH = logoW * logoRatio;
      const x = width - pad.right - logoW - 2;
      const y = height - pad.bottom - logoH - 6;
      if (watermarkLogo.complete && watermarkLogo.naturalWidth) {
        ctx.filter = "brightness(0)";
        ctx.drawImage(watermarkLogo, x, y, logoW, logoH);
      } else {
        ctx.fillStyle = "#000";
        ctx.font = "bold 14px -apple-system, BlinkMacSystemFont, PingFang SC";
        ctx.textAlign = "right";
        ctx.textBaseline = "bottom";
        ctx.fillText("金十数据", width - pad.right - 2, height - pad.bottom - 8);
      }
      ctx.restore();
    }

    function normalizeDateKey(date) {
      return String(date).replace(/\./g, "-");
    }

    function monthKey(date) {
      return normalizeDateKey(date).slice(0, 7);
    }

    function monthIndexFromKey(key) {
      const [year, month] = key.split("-").map(Number);
      return year * 12 + month - 1;
    }

    function monthKeyFromIndex(index) {
      const year = Math.floor(index / 12);
      const month = index % 12 + 1;
      return `${year}-${String(month).padStart(2, "0")}`;
    }

    function monthDateFromKey(key) {
      return `${key}-01`;
    }

    function monthEndTime(key) {
      const [year, month] = key.split("-").map(Number);
      return new Date(year, month, 0, 23, 59, 59).getTime();
    }

    function dedupeDateRows(rows) {
      const map = new Map();
      rows.forEach(([date, value]) => {
        if (Number.isFinite(Number(value))) {
          map.set(normalizeDateKey(date), Number(value));
        }
      });
      return Array.from(map.entries()).sort((a, b) => parseDateTime(a[0]) - parseDateTime(b[0]));
    }

    function dedupeMonthRows(rows) {
      const map = new Map();
      rows.forEach(([date, value]) => {
        if (Number.isFinite(Number(value))) {
          map.set(monthKey(date), Number(value));
        }
      });
      return Array.from(map.entries())
        .sort((a, b) => monthIndexFromKey(a[0]) - monthIndexFromKey(b[0]))
        .map(([month, value]) => [monthDateFromKey(month), value]);
    }

    function buildMonthlyLevelRows(rows) {
      const source = dedupeDateRows(rows);
      if (!source.length) return [];
      const startIndex = monthIndexFromKey(monthKey(source[0][0]));
      const endIndex = monthIndexFromKey(monthKey(source.at(-1)[0]));
      const monthly = [];
      let cursor = 0;
      let current = source[0][1];

      for (let index = startIndex; index <= endIndex; index += 1) {
        const key = monthKeyFromIndex(index);
        const endTime = monthEndTime(key);
        while (cursor < source.length && parseDateTime(source[cursor][0]) <= endTime) {
          current = source[cursor][1];
          cursor += 1;
        }
        monthly.push([monthDateFromKey(key), current]);
      }
      return monthly;
    }

    function buildMonthlyInterpolatedRows(rows) {
      const anchors = dedupeMonthRows(rows);
      if (!anchors.length) return [];
      const startIndex = monthIndexFromKey(monthKey(anchors[0][0]));
      const endIndex = monthIndexFromKey(monthKey(anchors.at(-1)[0]));
      const byMonth = new Map(anchors.map(([date, value]) => [monthKey(date), value]));
      const monthly = [];
      let nextAnchorIndex = 1;

      for (let index = startIndex; index <= endIndex; index += 1) {
        const key = monthKeyFromIndex(index);
        if (byMonth.has(key)) {
          monthly.push([monthDateFromKey(key), byMonth.get(key)]);
          continue;
        }

        while (
          nextAnchorIndex < anchors.length &&
          monthIndexFromKey(monthKey(anchors[nextAnchorIndex][0])) < index
        ) {
          nextAnchorIndex += 1;
        }

        const next = anchors[nextAnchorIndex];
        const prev = anchors[nextAnchorIndex - 1] || anchors[0];
        if (!prev || !next) {
          monthly.push([monthDateFromKey(key), prev ? prev[1] : anchors[0][1]]);
          continue;
        }

        const prevIndex = monthIndexFromKey(monthKey(prev[0]));
        const nextIndex = monthIndexFromKey(monthKey(next[0]));
        const ratio = (index - prevIndex) / Math.max(nextIndex - prevIndex, 1);
        const value = prev[1] + (next[1] - prev[1]) * ratio;
        monthly.push([monthDateFromKey(key), Number(value.toFixed(2))]);
      }
      return monthly;
    }

    function buildMacroMonthlyRows(key, rows) {
      if (key === "rate") return buildMonthlyLevelRows(rows);
      return buildMonthlyInterpolatedRows(rows);
    }

    function parseFredText(text) {
      return text.split(/\r?\n/)
        .map((line) => {
          const match = line.trim().match(/^(\d{4}-\d{2}-\d{2})\s+(-?\d+(?:\.\d+)?)$/);
          return match ? [match[1], Number(match[2])] : null;
        })
        .filter(Boolean);
    }

    function priceIndexToYoY(rows) {
      const byMonth = new Map(dedupeMonthRows(rows).map(([date, value]) => [monthKey(date), value]));
      return Array.from(byMonth.keys()).sort().map((month) => {
        const index = monthIndexFromKey(month);
        const priorMonth = monthKeyFromIndex(index - 12);
        const current = byMonth.get(month);
        const prior = byMonth.get(priorMonth);
        if (!Number.isFinite(current) || !Number.isFinite(prior) || !prior) return null;
        return [monthDateFromKey(month), Number((((current / prior) - 1) * 100).toFixed(2))];
      }).filter(Boolean);
    }

    async function fetchOfficialFredSeries(url) {
      const response = await fetch(`${url}.txt`, { cache: "no-store" });
      if (!response.ok) throw new Error(`FRED ${response.status}`);
      return parseFredText(await response.text());
    }

    function applyOfficialMacroSeries(series, fromCache = false) {
      if (!series || !series.rate || !series.cpi || !series.unemployment) return false;
      window.MACRO_ACTUAL_DATA.series.rate = dedupeMonthRows(series.rate);
      window.MACRO_ACTUAL_DATA.series.cpi = dedupeMonthRows(series.cpi);
      window.MACRO_ACTUAL_DATA.series.unemployment = dedupeMonthRows(series.unemployment);
      window.MACRO_ACTUAL_DATA.loadedOfficial = true;
      window.MACRO_ACTUAL_DATA.loadedFromCache = fromCache;
      Object.keys(rangeStates).forEach((key) => delete rangeStates[key]);
      return true;
    }

    function loadOfficialMacroFromCache() {
      try {
        const cached = localStorage.getItem(officialMacroCacheKey);
        if (!cached) return false;
        return applyOfficialMacroSeries(JSON.parse(cached), true);
      } catch (error) {
        return false;
      }
    }

    async function loadOfficialMacroData() {
      const urls = window.MACRO_ACTUAL_DATA?.sourceUrls || {};
      if (!urls.rate || !urls.cpi || !urls.unemployment) return;
      try {
        const [rate, pceIndex, unemployment] = await Promise.all([
          fetchOfficialFredSeries(urls.rate),
          fetchOfficialFredSeries(urls.cpi),
          fetchOfficialFredSeries(urls.unemployment)
        ]);
        const series = {
          rate: dedupeMonthRows(rate),
          cpi: priceIndexToYoY(pceIndex),
          unemployment: dedupeMonthRows(unemployment)
        };
        if (!series.rate.length || !series.cpi.length || !series.unemployment.length) return;
        applyOfficialMacroSeries(series);
        localStorage.setItem(officialMacroCacheKey, JSON.stringify(series));
        render();
      } catch (error) {
        console.warn("Official FRED macro data failed to load; using embedded fallback.", error);
      }
    }

    function getGlobalMacroRows(key) {
      if (!macroKeys.has(key)) return [];
      const localRows = window.MACRO_ACTUAL_DATA?.series?.[key] || [];
      const powellRows = window.POWELL_CHART_DATA?.series?.[key] || [];
      const rows = window.MACRO_ACTUAL_DATA?.loadedOfficial ? localRows : [...localRows, ...powellRows];
      return window.MACRO_ACTUAL_DATA?.loadedOfficial
        ? dedupeMonthRows(rows)
        : buildMacroMonthlyRows(key, rows);
    }

    function getMacroRowsForTerm(id, key) {
      if (!macroKeys.has(key)) return [];
      const range = getTermRange(id);
      const start = parseDateTime(range.start);
      const end = parseDateTime(range.end);
      const rows = getGlobalMacroRows(key);
      const startMonth = monthKey(range.start);
      const endMonth = monthKey(range.end);
      const filtered = rows.filter(([date]) => {
        const month = monthKey(date);
        if (month >= startMonth && month <= endMonth) return true;
        const time = parseDateTime(date);
        return time >= start && time <= end;
      });
      if (filtered.length) return filtered;
      const fallback = rows.filter(([date]) => parseDateTime(date) <= end).at(-1);
      return fallback ? [fallback] : [];
    }

    function getSeriesSummary(id, key) {
      const points = getSeriesPoints(id, key);
      if (!points.length) return null;
      const values = points.map((point) => point.value).filter(Number.isFinite);
      if (!values.length) return null;
      return {
        startDate: points[0].date,
        start: values[0],
        endDate: points.at(-1).date,
        end: values.at(-1),
        min: Math.min(...values),
        max: Math.max(...values),
        avg: average(values),
        count: values.length
      };
    }

    function drawTooltip(ctx, chart, plottedSeries, width, height, pad) {
      const state = tooltipStates[chart.key];
      if (!state) return;

      if (mode === "compare") {
        const targetX = state.x;
        const displayUnit = chart.market ? "%" : chart.unit;
        const rows = plottedSeries.map((series) => {
          if (!series.points.length) return null;
          const point = series.points.reduce((best, item) => Math.abs(item.x - targetX) < Math.abs(best.x - targetX) ? item : best, series.points[0]);
          return { series, point };
        }).filter(Boolean);
        if (!rows.length) return;
        const anchor = rows[0].point;
        const elapsedText = Number.isFinite(anchor.elapsedYears) ? "任期第" + Math.max(0, anchor.elapsedYears).toFixed(anchor.elapsedYears < 1 ? 1 : 0) + "年" : "任期对比";
        const boxWidth = 134;
        const boxHeight = 28 + rows.length * 18;
        const boxX = clamp(targetX + 10, 6, width - boxWidth - 6);
        const boxY = clamp(anchor.y - boxHeight / 2, pad.top, height - pad.bottom - boxHeight);

        ctx.save();
        ctx.strokeStyle = "rgba(31,101,214,.25)";
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.moveTo(targetX, pad.top);
        ctx.lineTo(targetX, height - pad.bottom);
        ctx.stroke();
        ctx.setLineDash([]);
        rows.forEach(({ series, point }) => drawMarkedPoint(ctx, point, series.color, 3.5));

        ctx.shadowColor = "rgba(18,32,55,.13)";
        ctx.shadowBlur = 8;
        ctx.shadowOffsetY = 3;
        drawRoundRect(ctx, boxX, boxY, boxWidth, boxHeight, 4);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "#dfe8f5";
        ctx.stroke();

        ctx.textBaseline = "top";
        ctx.textAlign = "left";
        ctx.fillStyle = "#6b778b";
        ctx.font = "10px -apple-system, BlinkMacSystemFont, PingFang SC";
        ctx.fillText(elapsedText, boxX + 10, boxY + 7);
        rows.forEach(({ series, point }, index) => {
          const y = boxY + 24 + index * 18;
          ctx.fillStyle = series.color;
          ctx.beginPath();
          ctx.arc(boxX + 12, y + 6, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#263044";
          ctx.font = "11px -apple-system, BlinkMacSystemFont, PingFang SC";
          ctx.fillText(series.name, boxX + 20, y);
          ctx.fillStyle = series.color;
          ctx.font = "bold 11px D-DIN-PRO, DIN Alternate, Arial Narrow";
          ctx.textAlign = "right";
          ctx.fillText(formatValue(point.value, displayUnit), boxX + boxWidth - 10, y);
          ctx.textAlign = "left";
        });
        ctx.restore();
        return;
      }

      if (chart.neutralRate && state.multi) {
        const targetX = state.x;
        const rows = plottedSeries.map((series) => {
          if (!series.points.length) return null;
          const point = series.points.reduce((best, item) => Math.abs(item.x - targetX) < Math.abs(best.x - targetX) ? item : best, series.points[0]);
          return { series, point };
        }).filter(Boolean);
        if (!rows.length) return;
        const anchor = rows[0].point;
        const dateText = anchor.date ? formatDateMonth(anchor.date) : "利率";
        const boxWidth = 150;
        const boxHeight = 28 + rows.length * 18;
        const boxX = clamp(targetX + 10, 6, width - boxWidth - 6);
        const boxY = clamp(anchor.y - boxHeight / 2, pad.top, height - pad.bottom - boxHeight);

        ctx.save();
        ctx.strokeStyle = "rgba(31,101,214,.25)";
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.moveTo(targetX, pad.top);
        ctx.lineTo(targetX, height - pad.bottom);
        ctx.stroke();
        ctx.setLineDash([]);
        rows.forEach(({ series, point }) => drawMarkedPoint(ctx, point, series.color, 3.5));

        ctx.shadowColor = "rgba(18,32,55,.13)";
        ctx.shadowBlur = 8;
        ctx.shadowOffsetY = 3;
        drawRoundRect(ctx, boxX, boxY, boxWidth, boxHeight, 4);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "#dfe8f5";
        ctx.stroke();

        ctx.textBaseline = "top";
        ctx.textAlign = "left";
        ctx.fillStyle = "#6b778b";
        ctx.font = "10px -apple-system, BlinkMacSystemFont, PingFang SC";
        ctx.fillText(dateText, boxX + 10, boxY + 7);
        rows.forEach(({ series, point }, index) => {
          const y = boxY + 24 + index * 18;
          ctx.fillStyle = series.color;
          ctx.beginPath();
          ctx.arc(boxX + 12, y + 6, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#263044";
          ctx.font = "11px -apple-system, BlinkMacSystemFont, PingFang SC";
          ctx.fillText(series.name, boxX + 20, y);
          ctx.fillStyle = series.color;
          ctx.font = "bold 11px D-DIN-PRO, DIN Alternate, Arial Narrow";
          ctx.textAlign = "right";
          ctx.fillText(formatValue(point.rawValue ?? point.value, chart.unit), boxX + boxWidth - 10, y);
          ctx.textAlign = "left";
        });
        ctx.restore();
        return;
      }

      const series = plottedSeries[state.seriesIndex] || plottedSeries[0];
      if (!series) return;
      const point = series.points.find((item) => item.sourceIndex === state.sourceIndex) || series.points[0];
      if (!point) return;
      const macroMonthly = ["rate", "cpi", "unemployment"].includes(chart.key);
      const dateText = point.date ? (macroMonthly ? formatDateMonth(point.date) : formatDateDot(point.date)) : "第" + (point.sourceIndex + 1) + "点";
      const valueText = formatValue(point.rawValue ?? point.value, chart.unit);
      const boxWidth = Math.max(94, Math.max(dateText.length, valueText.length) * 7 + 20);
      const boxHeight = 42;
      const boxX = clamp(point.x + 10, 6, width - boxWidth - 6);
      const boxY = clamp(point.y - boxHeight - 12, pad.top, height - pad.bottom - boxHeight);

      ctx.save();
      ctx.strokeStyle = "rgba(31,101,214,.25)";
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(point.x, pad.top);
      ctx.lineTo(point.x, height - pad.bottom);
      ctx.stroke();
      ctx.setLineDash([]);
      drawMarkedPoint(ctx, point, series.color, 4);
      ctx.shadowColor = "rgba(18,32,55,.13)";
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 3;
      drawRoundRect(ctx, boxX, boxY, boxWidth, boxHeight, 4);
      ctx.fillStyle = "#fff";
      ctx.fill();
      ctx.shadowColor = "transparent";
      ctx.strokeStyle = "#dfe8f5";
      ctx.stroke();
      ctx.fillStyle = "#6b778b";
      ctx.font = "10px -apple-system, BlinkMacSystemFont, PingFang SC";
      ctx.textBaseline = "top";
      ctx.textAlign = "left";
      ctx.fillText(dateText, boxX + 10, boxY + 7);
      ctx.fillStyle = series.color;
      ctx.font = "bold 12px D-DIN-PRO, DIN Alternate, Arial Narrow";
      ctx.fillText(valueText, boxX + 10, boxY + 23);
      ctx.restore();
    }

    function getWorkbookRows(key) {
      return window.POWELL_CHART_DATA && window.POWELL_CHART_DATA.series
        ? window.POWELL_CHART_DATA.series[key]
        : null;
    }

    function getWorkbookSummary(key) {
      return window.POWELL_CHART_DATA && window.POWELL_CHART_DATA.summary
        ? window.POWELL_CHART_DATA.summary[key]
        : null;
    }

    function getSeriesPoints(id, key) {
      const macroRows = getMacroRowsForTerm(id, key);
      if (macroRows.length) {
        return macroRows.map(([date, value], index) => ({ date, index, value }));
      }
      const workbookRows = id === "powell" ? getWorkbookRows(key) : null;
      if (workbookRows && workbookRows.length) {
        return workbookRows.map(([date, value], index) => ({ date, index, value }));
      }
      const values = byId(id).series[key] || [];
      return values.map((value, index) => ({ index, value }));
    }

    function getSeriesValues(id, key) {
      return getSeriesPoints(id, key).map((point) => point.value);
    }

    function getNeutralRatePointsForTerm(id) {
      const rows = (window.NEUTRAL_RATE_DATA?.series || [])
        .map(([date, value], index) => ({ date, value: Number(value), time: parseDateTime(date), index }))
        .filter((point) => Number.isFinite(point.value) && Number.isFinite(point.time))
        .sort((a, b) => a.time - b.time);
      if (!rows.length) return [];
      const range = getTermRange(id);
      const startTime = parseDateTime(range.start);
      const endTime = parseDateTime(range.end);
      const inRange = rows.filter((point) => point.time >= startTime && point.time <= endTime);
      const previous = rows.filter((point) => point.time <= startTime).at(-1);
      const lastKnown = inRange.at(-1) || previous;
      const points = [];
      if (previous) points.push({ date: range.start, value: previous.value, index: -1 });
      inRange.forEach((point) => points.push({ date: point.date, value: point.value, index: point.index }));
      if (lastKnown && (!points.length || points.at(-1).date !== range.end)) {
        points.push({ date: range.end, value: lastKnown.value, index: rows.length });
      }
      return points;
    }

    function getChartHeadline(chairman, chart) {
      const summary = getSeriesSummary(chairman.id, chart.key) || (chairman.id === "powell" ? getWorkbookSummary(chart.key) : null);
      if (chart.key === "cpi" || chart.key === "unemployment") {
        return summary ? `峰值 ${formatValue(summary.max, "%")}` : formatHeadline(chairman, chart.key);
      }
      if (!summary) return formatHeadline(chairman, chart.key);

      if (chart.key === "rate") {
        const bp = Math.round((summary.end - summary.start) * 100);
        if (bp === 0) return "未有利率变动";
        return `${bp >= 0 ? "任内加息" : "任内降息"} ${Math.abs(bp)}bp`;
      }
      if (chart.key === "cpi") return `峰值 ${formatValue(summary.max, "%")}`;
      if (chart.key === "unemployment") return `峰值 ${formatValue(summary.max, "%")}`;
      if (chart.market) {
        const pct = ((summary.end / summary.start) - 1) * 100;
        return `任内 ${pct >= 0 ? "+" : ""}${pct.toFixed(Math.abs(pct) >= 100 ? 0 : 1)}%`;
      }
      return formatHeadline(chairman, chart.key);
    }

    function formatValue(value, unit) {
      if (unit === "%") return `${Number(value).toFixed(value < 10 ? 1 : 0)}%`;
      return Number(value).toLocaleString("en-US", { maximumFractionDigits: value < 100 ? 1 : 0 });
    }

    function toneClass(text) {
      if (isZeroMoveText(text)) return "gray";
      return text.includes("-") || text.includes("降息") ? "green" : isDirectionalText(text) ? "red" : "blue";
    }

    function normalize(values) {
      const first = values[0] || 1;
      return values.map((value) => Number(((value / first) * 100).toFixed(1)));
    }

    function performanceSeries(values) {
      const first = values[0] || 1;
      return values.map((value) => Number((((value / first) - 1) * 100).toFixed(2)));
    }

    function average(values) {
      const valid = values.filter((value) => Number.isFinite(value));
      if (!valid.length) return 0;
      return valid.reduce((sum, value) => sum + value, 0) / valid.length;
    }

    function formatAverage(id, key) {
      return `均值 ${formatValue(average(getSeriesValues(id, key)), "%")}`;
    }

    function formatRateMove(id) {
      const values = getSeriesValues(id, "rate");
      if (values.length < 2) return "未变动";
      const bp = Math.round((values.at(-1) - values[0]) * 100);
      if (bp === 0) return "未变动";
      return `${bp > 0 ? "+" : "-"}${Math.abs(bp)}bp`;
    }

    function formatMarketMove(id, key) {
      const values = getSeriesValues(id, key);
      if (values.length < 2 || !values[0]) return "--";
      const pct = ((values.at(-1) / values[0]) - 1) * 100;
      const digits = Math.abs(pct) >= 100 ? 0 : 1;
      return `${pct >= 0 ? "+" : ""}${pct.toFixed(digits)}%`;
    }

    function elapsedYearsFromPoint(id, point, index, total) {
      const range = getTermRange(id);
      const start = parseDateTime(range.start);
      const time = point.date ? parseDateTime(point.date) : interpolateDate(range.start, range.end, index, total);
      return Math.max(0, (time - start) / (365.25 * 24 * 60 * 60 * 1000));
    }

    function buildElapsedTicks(minYear, maxYear) {
      const candidates = [1, 3, 5, 7, 9, 10, 12, 15, 18, 20];
      const ticks = candidates.filter((year) => year >= minYear - .05 && year <= maxYear + .05);
      if (!ticks.length && maxYear > 0) ticks.push(Math.max(1, Math.round(maxYear)));
      return ticks;
    }

        renderComparePicker();

    function renderModePicker() {

      [

      ].forEach(([containerSelector, activeSelector]) => {

        container.scrollTop = Math.max(0, target);

    function renderComparePicker() {
      $("#app").classList.toggle("is-picker-open", mode === "compare" && comparePickerOpen);
      const activeIds = comparePickerOpen ? draftCompareIds : compareIds;

    function sortIcon(column) {
      const active = compareSort.key === column.key;
      const direction = active ? compareSort.direction : "";
      return `
        <button class="sort-btn ${active ? "is-active is-" + direction : ""}" type="button" data-sort="${column.key}" aria-label="${column.label}排序">
          <svg class="sort-icon" viewBox="0 0 12 12" aria-hidden="true">
            <path class="sort-up" d="M6 2 3 5h6L6 2Z"></path>

    function renderCompareHeader() {
      $("#compareHeader").innerHTML = compareColumns.map((column) => `

            ${column.sortable ? sortIcon(column) : ""}

      $("#compareHeader").querySelectorAll("[data-sort]").forEach((button) => {

          compareSort = compareSort.key === key
            ? { key, direction: compareSort.direction === "desc" ? "asc" : "desc" }

    function rateMoveData(id) {
      const values = getSeriesValues(id, "rate");
      if (values.length < 2) return { value: 0, label: "未变动" };
      const value = Math.round((values.at(-1) - values[0]) * 100);
      return { value, label: value === 0 ? "未变动" : `${value > 0 ? "+" : "-"}${Math.abs(value)}bp` };
    }

    function marketMoveData(id, key) {
      const values = getSeriesValues(id, key);
      if (values.length < 2 || !values[0]) return { value: null, label: "--" };
      const value = ((values.at(-1) / values[0]) - 1) * 100;
      const digits = Math.abs(value) >= 100 ? 0 : 1;
      return { value, label: `${value >= 0 ? "+" : ""}${value.toFixed(digits)}%` };
    }

    function getCompareRowData(id, order) {
      const cpiAvg = average(getSeriesValues(id, "cpi"));
      const jobAvg = average(getSeriesValues(id, "unemployment"));
      const rate = rateMoveData(id);
      const gold = marketMoveData(id, "gold");
      const wti = marketMoveData(id, "wti");
      const dxy = marketMoveData(id, "dxy");
      const spx = marketMoveData(id, "spx");
      return {
        id,
        order,
        chairman: byId(id),
        sortValues: {
          rate: rate.value,
          cpi: cpiAvg,
          unemployment: jobAvg,
          gold: gold.value,
          wti: wti.value,
          dxy: dxy.value,
          spx: spx.value
        },
        labels: {
          rate: rate.label,
          cpi: formatValue(cpiAvg, "%"),
          unemployment: formatValue(jobAvg, "%"),
          gold: gold.label,
          wti: wti.label,
          dxy: dxy.label,
          spx: spx.label
        }
      };
    }

    function sortedCompareRows() {
      const rows = compareIds.map(getCompareRowData);
      if (!compareSort.key) return rows;
      const direction = compareSort.direction === "asc" ? 1 : -1;
      return rows.sort((a, b) => {
        const av = a.sortValues[compareSort.key];
        const bv = b.sortValues[compareSort.key];
        const aMissing = !Number.isFinite(av);
        const bMissing = !Number.isFinite(bv);
        if (aMissing && bMissing) return a.order - b.order;
        if (aMissing) return 1;
        if (bMissing) return -1;
        return (av - bv) * direction || a.order - b.order;
      });
    }

    function renderCompareRows() {
      renderCompareHeader();
      $("#compareRows").innerHTML = sortedCompareRows().map((row) => {
        return `
          <tr>
            <td>${row.chairman.shortName}</td>
            <td class="${toneClass(row.labels.rate)}">${row.labels.rate}</td>
            <td>${row.labels.cpi}</td>
            <td>${row.labels.unemployment}</td>
            <td class="${toneClass(row.labels.gold)}">${row.labels.gold}</td>
            <td class="${toneClass(row.labels.wti)}">${row.labels.wti}</td>
            <td class="${toneClass(row.labels.dxy)}">${row.labels.dxy}</td>
            <td class="${toneClass(row.labels.spx)}">${row.labels.spx}</td>

    function renderCharts() {
      const container = $("#charts");
      container.innerHTML = charts.map((chart) => {
        const chairman = byId(currentId);
        const range = getTermRange(currentId);
        const headline = getChartHeadline(chairman, chart);
        const meta = mode === "compare" && chart.market ? "任期内累计涨跌幅(%)" : chart.meta;
        const guideLegends = mode !== "compare" ? [
          ...(chart.neutralRate ? [
            { type: "swatch", label: "联邦基金利率上限", color: fedBlue },
            { type: "line", label: "目标中性利率" }
          ] : []),
          ...(chart.guideLines || []).filter((line) => line.legend).map((line) => ({ type: "line", label: line.label })),
          ...(chart.guideBand ? [{ type: "band", label: chart.guideBand.label }] : [])
        ] : [];
        return `
          <article class="chart-card">
            <div class="chart-head">
              <div class="chart-title-wrap">
                <div class="chart-title">${chart.title}</div>
              </div>
              ${mode === "compare" ? (meta ? `<div class="chart-meta">${meta}</div>` : "") : `<div class="chart-stat" style="color:${statColor(headline)}">${headline}</div>`}
            </div>
            ${guideLegends.length ? `<div class="chart-guide-row">${guideLegends.map((item) => `<div class="chart-guide-legend ${item.type === "line" ? "is-line" : ""}"><i ${item.color ? `style="background:${item.color}"` : ""}></i>${item.label}</div>`).join("")}</div>` : ""}
            ${mode === "compare" ? `<div class="legend">${compareIds.map((id, index) => `<span class="legend-item"><i class="legend-line" style="background:${chairColor(id)}"></i>${byId(id).shortName}</span>`).join("")}</div>` : ""}
            <canvas class="chart" id="chart-${chart.key}" width="680" height="460"></canvas>
            <canvas class="range-chart" id="range-${chart.key}" width="680" height="76"></canvas>
          </article>
        `;
      }).join("");

      requestAnimationFrame(() => charts.forEach((chart) => {
        bindChartTooltip(chart);
        bindRangeInteraction(chart);
        drawChart(chart);
        drawRangeChart(chart);
      }));
    }

    function getCanvasPoint(event, canvas) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top,
        width: rect.width,
        height: rect.height
      };
    }

    function bindChartTooltip(chart) {
      const canvas = document.getElementById(`chart-${chart.key}`);
      if (!canvas) return;
      canvas.onpointerdown = (event) => {
        const position = getCanvasPoint(event, canvas);
        const plottedSeries = chartPointCache[chart.key] || [];
        let best = null;
        plottedSeries.forEach((series, seriesIndex) => {
          series.points.forEach((point) => {
            const distance = Math.abs(point.x - position.x) + Math.abs(point.y - position.y) * .35;
            if (!best || distance < best.distance) {
              best = { distance, seriesIndex, sourceIndex: point.sourceIndex, x: point.x };
            }
          });
        });
        if (!best) return;
        tooltipStates[chart.key] = mode === "compare"
          ? { x: best.x }
          : chart.neutralRate
            ? { x: best.x, multi: true }
            : best;
        drawChart(chart);
      };
    }

    function bindRangeInteraction(chart) {
      const canvas = document.getElementById(`range-${chart.key}`);
      if (!canvas) return;
      canvas.onpointerdown = (event) => {
        event.preventDefault();
        const position = getCanvasPoint(event, canvas);
        const state = getRangeState(chart.key);
        const ratio = clamp(position.x / Math.max(position.width, 1), 0, 1);
        const handleHit = 14 / Math.max(position.width, 1);
        let dragType = "move";
        if (Math.abs(ratio - state.start) <= handleHit) dragType = "start";
        else if (Math.abs(ratio - state.end) <= handleHit) dragType = "end";
        else if (ratio < state.start || ratio > state.end) {
          const width = state.end - state.start;
          const start = clamp(ratio - width / 2, 0, 1 - width);
          setRangeState(chart.key, { start, end: start + width });
        }
        activeRangeDrag = {
          key: chart.key,
          type: dragType,
          startRatio: ratio,
          stateStart: getRangeState(chart.key).start,
          stateEnd: getRangeState(chart.key).end,
          width: position.width,
          pointerId: event.pointerId
        };
        canvas.setPointerCapture?.(event.pointerId);
        tooltipStates[chart.key] = null;
        drawChart(chart);
        drawRangeChart(chart);
      };

      canvas.onpointermove = (event) => {
        if (!activeRangeDrag || activeRangeDrag.key !== chart.key) return;
        event.preventDefault();
        const position = getCanvasPoint(event, canvas);
        const delta = (position.x / Math.max(position.width, 1)) - activeRangeDrag.startRatio;
        const span = activeRangeDrag.stateEnd - activeRangeDrag.stateStart;
        if (activeRangeDrag.type === "start") {
          setRangeState(chart.key, {
            start: activeRangeDrag.stateStart + delta,
            end: activeRangeDrag.stateEnd,
            anchor: "end"
          });
        } else if (activeRangeDrag.type === "end") {
          setRangeState(chart.key, {
            start: activeRangeDrag.stateStart,
            end: activeRangeDrag.stateEnd + delta,
            anchor: "start"
          });
        } else {
          const start = clamp(activeRangeDrag.stateStart + delta, 0, 1 - span);
          setRangeState(chart.key, { start, end: start + span });
        }
        drawChart(chart);
        drawRangeChart(chart);
      };

      const stopDrag = (event) => {
        if (!activeRangeDrag || activeRangeDrag.key !== chart.key) return;
        canvas.releasePointerCapture?.(event.pointerId);
        activeRangeDrag = null;
      };
      canvas.onpointerup = stopDrag;
      canvas.onpointercancel = stopDrag;
      canvas.onlostpointercapture = () => {
        if (activeRangeDrag?.key === chart.key) activeRangeDrag = null;
      };
    }

    function drawChart(chart) {
      const canvas = document.getElementById(`chart-${chart.key}`);
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = rect.width || 340;
      const height = rect.height || 180;
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const pad = { top: 18, right: 12, bottom: 30, left: 40 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const series = mode === "compare"
        ? compareIds.map((id, index) => {
          const rawPoints = getSeriesPoints(id, chart.key);
          const rawValues = rawPoints.map((point) => point.value);
          const drawValues = chart.market ? performanceSeries(rawValues) : rawValues;
          const points = rawPoints.map((point, pointIndex) => ({
            ...point,
            sourceIndex: point.index ?? pointIndex,
            elapsedYears: elapsedYearsFromPoint(id, point, pointIndex, rawPoints.length),
            value: drawValues[pointIndex],
            rawValue: rawValues[pointIndex]
          }));
          const visiblePoints = filterPointsByRange(points, chart.key);
          return {
            color: chairColor(id),
            name: byId(id).shortName,
            points: visiblePoints,
            values: visiblePoints.map((point) => point.value)
          };
        })
        : (() => {
          const points = getSeriesPoints(currentId, chart.key).map((point) => ({
            ...point,
            sourceIndex: point.index,
            rawValue: point.value
          }));
          const visiblePoints = filterPointsByRange(points, chart.key);
          if (chart.neutralRate) {
            const neutralPoints = getNeutralRatePointsForTerm(currentId).map((point, index) => ({
              ...point,
              sourceIndex: `neutral-${index}`,
              rawValue: point.value
            }));
            const visibleNeutralPoints = filterPointsByRange(neutralPoints, chart.key);
            return [
              {
                color: chart.color,
                name: "联邦基金利率上限",
                points: visiblePoints,
                values: visiblePoints.map((point) => point.value),
                showMarkers: true,
                showLabels: true
              },
              {
                color: neutralRateRed,
                name: "目标中性利率",
                points: visibleNeutralPoints,
                values: visibleNeutralPoints.map((point) => point.value),
                dash: [4, 4],
                lineWidth: 1,
                lineCap: "butt",
                showMarkers: false,
                showLabels: false
              }
            ].filter((item) => item.points.length);
          }
          return [{
            color: chart.color,
            name: chart.title,
            points: visiblePoints,
            values: visiblePoints.map((point) => point.value),
            area: true
          }];
        })();
      const values = series.flatMap((item) => item.values);
      if (!values.length) return;
      const axisUnit = mode === "compare" && chart.market ? "%" : chart.unit;
      const scale = buildNiceScale(values, { ...chart, unit: axisUnit });
      const min = scale.min;
      const max = scale.max;
      const primaryPoints = series[0].points || [];
      const compareElapsedValues = series.flatMap((item) => item.points.map((point) => point.elapsedYears).filter(Number.isFinite));
      const elapsedMin = mode === "compare" && compareElapsedValues.length ? Math.min(...compareElapsedValues) : 0;
      const elapsedMax = mode === "compare" && compareElapsedValues.length ? Math.max(...compareElapsedValues) : 0;
      const firstDate = primaryPoints.find((point) => point.date)?.date || getTermRange(currentId).start;
      const lastDate = [...primaryPoints].reverse().find((point) => point.date)?.date || getTermRange(currentId).end;
      const yearTicks = mode === "compare" ? [] : buildYearTicksForWidth(firstDate, lastDate, plotW, 42);
      const firstTime = parseDateTime(firstDate);
      const lastTime = parseDateTime(lastDate);

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = "#edf2f8";
      ctx.lineWidth = 1;
      ctx.fillStyle = "#8a96a8";
      ctx.font = "10px -apple-system, BlinkMacSystemFont, PingFang SC";
      ctx.textBaseline = "middle";
      ctx.textAlign = "left";

      scale.ticks.forEach((tick) => {
        const y = pad.top + plotH - ((tick - min) / (max - min || 1)) * plotH;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
        ctx.fillText(formatAxisLabel(tick, axisUnit), 6, y);
      });
      drawGuideLines(ctx, chart, width, pad, plotH, min, max);

      ctx.strokeStyle = "#edf2f8";
      ctx.beginPath();
      ctx.moveTo(pad.left, height - pad.bottom);
      ctx.lineTo(width - pad.right, height - pad.bottom);
      ctx.stroke();

      const plottedSeries = [];
      const deferredHighlights = [];
      series.forEach((item, seriesIndex) => {
        const dated = mode !== "compare" && item.points.length > 1 && item.points.every((point) => point.date);
        const startTime = dated ? new Date(item.points[0].date).getTime() : 0;
        const endTime = dated ? new Date(item.points[item.points.length - 1].date).getTime() : 0;
        const points = item.points.map((point, index) => {
          const xRatio = mode === "compare"
            ? (point.elapsedYears - elapsedMin) / Math.max(elapsedMax - elapsedMin, 1)
            : dated && lastTime > firstTime
              ? (new Date(point.date).getTime() - firstTime) / (lastTime - firstTime)
              : index / Math.max(item.points.length - 1, 1);
          return {
            x: pad.left + plotW * xRatio,
            y: pad.top + plotH - (point.value - min) / (max - min || 1) * plotH,
            value: point.value,
            rawValue: point.rawValue,
            date: point.date,
            sourceIndex: point.sourceIndex
          };
        });
        plottedSeries.push({ color: item.color, name: item.name, points });

        if (item.area && points.length > 1) {
          const gradient = ctx.createLinearGradient(0, pad.top, 0, height - pad.bottom);
          gradient.addColorStop(0, item.color + "26");
          gradient.addColorStop(1, item.color + "00");
          ctx.beginPath();
          ctx.moveTo(points[0].x, height - pad.bottom);
          points.forEach((point) => ctx.lineTo(point.x, point.y));
          ctx.lineTo(points.at(-1).x, height - pad.bottom);
          ctx.closePath();
          ctx.fillStyle = gradient;
          ctx.fill();
        }

        ctx.beginPath();
        points.forEach((point, index) => index ? ctx.lineTo(point.x, point.y) : ctx.moveTo(point.x, point.y));
        ctx.strokeStyle = item.color;
        ctx.lineWidth = item.lineWidth || (mode === "compare" ? 1.8 : 2.4);
        ctx.lineJoin = "round";
        ctx.lineCap = item.lineCap || "round";
        ctx.setLineDash(item.dash || []);
        ctx.stroke();
        ctx.setLineDash([]);

        const last = points.at(-1);
        if (mode === "single" && points.length > 1 && item.showLabels !== false) {
          const first = points[0];
          const startLabel = formatValue(first.rawValue, chart.unit);
          const endLabel = formatValue(last.rawValue, chart.unit);
          const second = points[1];
          const prev = points[points.length - 2];
          const startOffset = second && second.y < first.y ? 18 : -18;
          const endOffset = prev && last.y < prev.y ? -18 : 18;
          const labelMinY = pad.top + 10;
          const labelMaxY = height - pad.bottom - 10;

          deferredHighlights.push(() => {
            drawMarkedPoint(ctx, first, item.color, 3.2);
            drawMarkedPoint(ctx, last, item.color, 3.4);
            ctx.fillStyle = item.color;
            ctx.font = "bold 12px D-DIN-PRO, DIN Alternate, Arial Narrow";
            ctx.textBaseline = "bottom";
            drawLabel(ctx, startLabel, first.x + 5, clamp(first.y + startOffset, labelMinY, labelMaxY), {
              color: item.color,
              align: "left",
              canvasWidth: width,
              canvasHeight: height
            });
            drawLabel(ctx, endLabel, last.x - 5, clamp(last.y + endOffset, labelMinY, labelMaxY), {
              color: item.color,
              align: "right",
              canvasWidth: width,
              canvasHeight: height
            });
          });
        } else if (last && mode !== "compare" && item.showMarkers !== false) {
          deferredHighlights.push(() => drawMarkedPoint(ctx, last, item.color, 3.4));
        }
      });
      chartPointCache[chart.key] = plottedSeries;

      ctx.fillStyle = "#66748a";
      ctx.font = "10px -apple-system, BlinkMacSystemFont, PingFang SC";
      ctx.textBaseline = "bottom";
      if (mode === "compare") {
        buildElapsedTicks(elapsedMin, elapsedMax).forEach((year) => {
          const ratio = (year - elapsedMin) / Math.max(elapsedMax - elapsedMin, 1);
          const x = pad.left + plotW * Math.max(0, Math.min(1, ratio));
          ctx.textAlign = ratio <= 0.05 ? "left" : ratio >= 0.95 ? "right" : "center";
          ctx.fillText(String(year) + "年", x, height - 9);
        });
      } else {
        yearTicks.forEach((year) => {
          const ratio = (new Date(Number(year), 0, 1).getTime() - firstTime) / Math.max(lastTime - firstTime, 1);
          const x = pad.left + plotW * Math.max(0, Math.min(1, ratio));
          ctx.textAlign = ratio <= 0.05 ? "left" : ratio >= 0.95 ? "right" : "center";
          ctx.fillText(year, clamp(x, 6, width - 6), height - 9);
        });
      }
      drawWatermark(ctx, width, height, pad);
      deferredHighlights.forEach((draw) => draw());
      drawTooltip(ctx, chart, plottedSeries, width, height, pad);
    }

    function getHistoricalRatePoints() {
      const points = [];
      chairmen.forEach((chairman) => {
        const rows = getSeriesPoints(chairman.id, "rate");
        const range = getTermRange(chairman.id);
        rows.forEach((point, index) => {
          const time = point.date ? parseDateTime(point.date) : interpolateDate(range.start, range.end, index, rows.length);
          points.push({ time, value: point.value, chairmanId: chairman.id, name: chairman.shortName });
        });
      });
      return points.sort((a, b) => a.time - b.time);
    }

    function drawHistoricalRateTooltip(ctx, width, height, pad) {
      if (!historicalRateTooltip || !historicalRatePointCache.length) return;
      const target = historicalRatePointCache.reduce((best, point) => Math.abs(point.x - historicalRateTooltip.x) < Math.abs(best.x - historicalRateTooltip.x) ? point : best, historicalRatePointCache[0]);
      const boxWidth = 118;
      const boxHeight = 48;
      const boxX = clamp(target.x + 10, 6, width - boxWidth - 6);
      const boxY = clamp(target.y - boxHeight - 10, pad.top, height - pad.bottom - boxHeight);
      ctx.save();
      ctx.strokeStyle = "rgba(31,101,214,.25)";
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(target.x, pad.top);
      ctx.lineTo(target.x, height - pad.bottom);
      ctx.stroke();
      ctx.setLineDash([]);
      drawMarkedPoint(ctx, target, target.color, 4);
      ctx.shadowColor = "rgba(18,32,55,.13)";
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 3;
      drawRoundRect(ctx, boxX, boxY, boxWidth, boxHeight, 4);
      ctx.fillStyle = "#fff";
      ctx.fill();
      ctx.shadowColor = "transparent";
      ctx.strokeStyle = "#dfe8f5";
      ctx.stroke();
      ctx.fillStyle = "#6b778b";
      ctx.font = "10px -apple-system, BlinkMacSystemFont, PingFang SC";
      ctx.textBaseline = "top";
      ctx.textAlign = "left";
      ctx.fillText(target.month, boxX + 10, boxY + 7);
      ctx.fillStyle = target.color;
      ctx.font = "bold 12px -apple-system, BlinkMacSystemFont, PingFang SC";
      ctx.fillText(target.name + " " + formatValue(target.value, "%"), boxX + 10, boxY + 25);
      ctx.restore();
    }

    function bindHistoricalRateTooltip() {
      const canvas = document.getElementById("historicalRateChart");
      if (!canvas) return;
      canvas.onpointerdown = (event) => {
        const pos = getCanvasPoint(event, canvas);
        historicalRateTooltip = { x: pos.x };
        drawHistoricalRateChart();
      };
    }

    function drawHistoricalRateChart() {
      const canvas = document.getElementById("historicalRateChart");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = rect.width || 340;
      const height = rect.height || 178;
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const points = getHistoricalRatePoints();
      if (!points.length) return;
      const minTime = points[0].time;
      const maxTime = points[points.length - 1].time;
      const values = points.map((point) => point.value);
      const scale = buildNiceScale(values, { unit: "%" });
      const pad = { top: 16, right: 8, bottom: 24, left: 34 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const xOf = (time) => pad.left + ((time - minTime) / (maxTime - minTime || 1)) * plotW;
      const yOf = (value) => pad.top + plotH - ((value - scale.min) / (scale.max - scale.min || 1)) * plotH;
      historicalRatePointCache = [];

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, width, height);

      chairmen.forEach((chairman, index) => {
        const range = getTermRange(chairman.id);
        const x1 = clamp(xOf(parseDateTime(range.start)), pad.left, width - pad.right);
        const x2 = clamp(xOf(parseDateTime(range.end)), pad.left, width - pad.right);
        if (x2 <= pad.left || x1 >= width - pad.right) return;
        ctx.fillStyle = chairTermColors[index % chairTermColors.length];
        ctx.fillRect(x1, pad.top, Math.max(1, x2 - x1), plotH);
        if (x2 - x1 > 42) {
          ctx.save();
          ctx.beginPath();
          ctx.rect(x1, pad.top, x2 - x1, plotH);
          ctx.clip();
          ctx.fillStyle = "rgba(85,98,118,.8)";
          ctx.font = "10px -apple-system, BlinkMacSystemFont, PingFang SC";
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.fillText(chairman.shortName, (x1 + x2) / 2, pad.top + 4);
          ctx.restore();
        }
      });

      ctx.strokeStyle = "rgba(226,232,242,.9)";
      ctx.lineWidth = 1;
      ctx.fillStyle = "#8a96a8";
      ctx.font = "10px -apple-system, BlinkMacSystemFont, PingFang SC";
      ctx.textBaseline = "middle";
      ctx.textAlign = "left";
      scale.ticks.forEach((tick) => {
        const y = yOf(tick);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
        ctx.fillText(formatAxisLabel(tick, "%"), 4, y);
      });

      chairmen.forEach((chairman) => {
        const group = points.filter((point) => point.chairmanId === chairman.id);
        if (!group.length) return;
        const color = chairColor(chairman.id);
        ctx.beginPath();
        group.forEach((point, index) => {
          const x = xOf(point.time);
          const y = yOf(point.value);
          historicalRatePointCache.push({ x, y, value: point.value, name: point.name, color, month: new Date(point.time).getFullYear() + "-" + String(new Date(point.time).getMonth() + 1).padStart(2, "0") });
          index ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
        });
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.stroke();
      });

      const startYear = yearFromTime(minTime);
      const endYear = yearFromTime(maxTime);
      const labelItems = [{ year: startYear, align: "left", x: pad.left }];
      for (let year = Math.ceil(startYear / 10) * 10; year <= endYear; year += 10) {
        const x = xOf(new Date(year + "-01-01").getTime());
        if (year !== startYear && year !== endYear && x > pad.left + 34 && x < width - pad.right - 38) {
          labelItems.push({ year, align: "center", x });
        }
      }
      labelItems.push({ year: endYear, align: "right", x: width - pad.right });
      ctx.fillStyle = "#66748a";
      ctx.font = "10px -apple-system, BlinkMacSystemFont, PingFang SC";
      ctx.textBaseline = "bottom";
      labelItems.forEach((item) => {
        ctx.textAlign = item.align;
        ctx.fillText(String(item.year), item.x, height - 6);
      });
      drawHistoricalRateTooltip(ctx, width, height, pad);
    }

    function drawRangeChart(chart) {
      const canvas = document.getElementById(`range-${chart.key}`);
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = rect.width || 340;
      const height = rect.height || 32;
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const pointsSource = mode === "compare"
        ? getSeriesPoints(compareIds[0] || currentId, chart.key)
        : getSeriesPoints(currentId, chart.key);
      if (!pointsSource.length) return;
      const sourceValues = pointsSource.map((point) => point.value);
      const values = mode === "compare" && chart.market ? performanceSeries(sourceValues) : sourceValues;
      const min = Math.min(...values);
      const max = Math.max(...values);
      const padX = 1;
      const top = 8;
      const bottom = 5;
      const plotW = width - padX * 2;
      const plotH = height - top - bottom;
      const firstDate = pointsSource.find((point) => point.date)?.date || getTermRange(currentId).start;
      const lastDate = [...pointsSource].reverse().find((point) => point.date)?.date || getTermRange(currentId).end;
      const firstTime = parseDateTime(firstDate);
      const lastTime = parseDateTime(lastDate);
      const rangeOwnerId = mode === "compare" ? (compareIds[0] || currentId) : currentId;
      const rangeElapsedMax = mode === "compare"
        ? elapsedYearsFromPoint(rangeOwnerId, pointsSource.at(-1), pointsSource.length - 1, pointsSource.length)
        : 0;
      const ticks = mode === "compare" ? buildElapsedTicks(0, rangeElapsedMax) : buildYearTicksForWidth(firstDate, lastDate, plotW, 52);

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#f8fbff";
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = "#e8edf5";
      ctx.lineWidth = 1;
      ctx.strokeRect(.5, .5, width - 1, height - 1);

      ctx.save();
      ctx.beginPath();
      ctx.rect(0, 0, width, height);
      ctx.clip();

      ctx.fillStyle = "#8b95a6";
      ctx.font = "10px -apple-system, BlinkMacSystemFont, PingFang SC";
      ctx.textBaseline = "top";
      ticks.forEach((tick) => {
        const ratio = mode === "compare"
          ? tick / Math.max(rangeElapsedMax, 1)
          : (new Date(Number(tick), 0, 1).getTime() - firstTime) / Math.max(lastTime - firstTime, 1);
        const x = padX + plotW * clamp(ratio, 0, 1);
        ctx.strokeStyle = "#e8edf5";
        ctx.beginPath();
        ctx.moveTo(x + .5, 0);
        ctx.lineTo(x + .5, height);
        ctx.stroke();
        ctx.textAlign = ratio <= .03 ? "left" : ratio >= .97 ? "right" : "center";
        ctx.fillText(mode === "compare" ? String(tick) + "年" : tick, clamp(x, 3, width - 3), 1);
      });

      const dated = mode !== "compare" && pointsSource.length > 1 && pointsSource.every((point) => point.date);
      const startTime = dated ? new Date(pointsSource[0].date).getTime() : 0;
      const endTime = dated ? new Date(pointsSource[pointsSource.length - 1].date).getTime() : 0;
      const miniPoints = pointsSource.map((point, index) => {
        const ratio = dated && endTime > startTime
          ? (new Date(point.date).getTime() - startTime) / (endTime - startTime)
          : index / Math.max(pointsSource.length - 1, 1);
        return {
          x: padX + plotW * clamp(ratio, 0, 1),
          y: top + plotH - ((values[index] - min) / (max - min || 1)) * plotH
        };
      });

      ctx.beginPath();
      miniPoints.forEach((point, index) => index ? ctx.lineTo(point.x, point.y) : ctx.moveTo(point.x, point.y));
      ctx.strokeStyle = "#88a9f4";
      ctx.lineWidth = 1;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.stroke();

      const range = getRangeState(chart.key);
      const selectionLeft = Math.round(width * range.start);
      const selectionRight = Math.round(width * range.end);
      const selectionWidth = Math.max(1, selectionRight - selectionLeft);
      ctx.fillStyle = "rgba(255,255,255,.78)";
      ctx.fillRect(selectionLeft, 0, selectionWidth, height);
      ctx.strokeStyle = "#e6eaf2";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(selectionLeft + .5, 0);
      ctx.lineTo(selectionLeft + .5, height);
      ctx.moveTo(selectionRight - .5, 0);
      ctx.lineTo(selectionRight - .5, height);
      ctx.stroke();
      ctx.fillStyle = "rgba(216,222,232,.75)";
      ctx.fillRect(selectionLeft - 2, 0, 4, height);
      ctx.fillRect(selectionRight - 2, 0, 4, height);

      ctx.restore();
    }

    init();
  </script>
</body>
